<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager</title>
  <link rel="icon" type="image/png" href="Logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-shell">

    <header class="header">
      <div class="header-eyebrow">
        <img src="Logo.png" class="header-logo" alt="logo" />
        Productivity System — v1.0
      </div>
      <h1 class="header-title">Task<span>.</span><br>Manager</h1>
      <p class="header-sub">Stay organised, get things done</p>
    </header>

    <main class="main">

      <!-- Add Task -->
      <div class="add-card">
        <div class="input-row">
          <input
            type="text"
            id="taskInput"
            class="task-input"
            placeholder="What needs to be done?"
            onkeydown="if(event.key==='Enter') addTask()"
          />
          <button class="add-btn" onclick="addTask()">
            <span class="add-icon">+</span>
            <span>Add</span>
          </button>
        </div>
      </div>

      <!-- Stats Bar -->
      <div class="stats-bar">
        <div class="stat">
          <strong id="totalCount">0</strong>
          Total
        </div>
        <div class="stat done-stat">
          <strong id="doneCount">0</strong>
          Done
        </div>
        <div class="stat">
          <strong id="pendingCount">0</strong>
          Remaining
        </div>
      </div>

      <!-- Filter Tabs -->
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
        <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
      </div>

      <!-- Section label -->
      <div class="section-label">Entries</div>

      <!-- Task List -->
      <ul id="taskList" class="task-list"></ul>

      <!-- Empty State -->
      <div id="emptyState" class="empty-state hidden">
        <span class="empty-icon">—</span>
        <p>No tasks here. Add one above.</p>
      </div>

    </main>

  </div>

  <script src="script.js"></script>
  <script>
    /* Patch renderTasks to add task index numbers */
    const _origRender = renderTasks;
    renderTasks = function(tasks) {
      _origRender(tasks);
      /* Wrap stat numbers only */
      ['totalCount','doneCount','pendingCount'].forEach(id => {
        const el = document.getElementById(id);
        if (el) {
          const num = el.textContent.replace(/[^\d]/g,'');
          el.textContent = num;
        }
      });
      /* Add index numbers to task items */
      const items = document.querySelectorAll('#taskList .task-item');
      items.forEach((item, i) => {
        if (!item.querySelector('.task-num')) {
          const num = document.createElement('span');
          num.className = 'task-num';
          num.textContent = String(i + 1).padStart(2, '0');
          item.insertBefore(num, item.firstChild);
        }
      });
    };
  </script>
</body>
</html>
