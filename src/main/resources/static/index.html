<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app-shell">

    <header class="header">
     <div class="header-icon">
  <img src="Logo.png" alt="logo">
	</div>
      <h1 class="header-title">Task Manager</h1>
      <p class="header-sub">Stay organised, get things done.</p>
    </header>

    <main class="main">

      <!-- Add Task -->
      <div class="add-card">
        <div class="input-row">
          <input
            type="text"
            id="taskInput"
            class="task-input"
            placeholder="What needs to be done?"
            onkeydown="if(event.key==='Enter') addTask()"
          />
          <button class="add-btn" onclick="addTask()">
            <span class="add-icon">+</span>
            <span>Add</span>
          </button>
        </div>
      </div>

      <!-- Stats Bar -->
      <div class="stats-bar">
        <span id="totalCount" class="stat">0 tasks</span>
        <span class="stat-divider">·</span>
        <span id="doneCount" class="stat done-stat">0 done</span>
        <span class="stat-divider">·</span>
        <span id="pendingCount" class="stat pending-stat">0 remaining</span>
      </div>

      <!-- Filter Tabs -->
      <div class="filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('active', this)">Active</button>
        <button class="filter-btn" onclick="setFilter('completed', this)">Completed</button>
      </div>

      <!-- Task List -->
      <ul id="taskList" class="task-list"></ul>

      <!-- Empty State -->
      <div id="emptyState" class="empty-state hidden">
        <div class="empty-icon">☀</div>
        <p>No tasks here. Add one above!</p>
      </div>

    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
